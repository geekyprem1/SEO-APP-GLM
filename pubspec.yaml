name: short_seo_ai
description: "ShortSEO AI - AI-powered SEO content generator for YouTube Shorts creators."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  # Required by the Flutter framework font manifest (CupertinoIcons family);
  # omitting it triggers a missing-font warning on release builds.
  cupertino_icons: ^1.0.8

  # State management & routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # Networking
  dio: ^5.5.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.4

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.4.0
  firebase_analytics: ^11.3.0
  firebase_crashlytics: ^4.1.0
  cloud_functions: ^5.0.0
  google_sign_in: ^6.2.1
  firebase_app_check: ^0.3.1

  # UI / UX
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.0
  gal: ^2.3.0

  # Utilities
  share_plus: ^10.0.0
  uuid: ^4.4.0
  logger: ^2.3.0
  url_launcher: ^6.3.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Codegen (Hive type adapters)
  build_runner: ^2.4.11
  hive_generator: ^2.0.1

  # App launcher icon generation
  flutter_launcher_icons: ^0.14.1

# Launcher icon config — run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/tubora.png"
  min_sdk_android: 23
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/tubora.png"

flutter:
  uses-material-design: true
